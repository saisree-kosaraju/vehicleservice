<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Service Management System - 2W, 3W & 4W</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            background: url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=1600') center/cover fixed;
            position: relative;
        }

        /* Dark Overlay for better readability */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-in;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Vehicle Type Badge */
        .vehicle-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-4w {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }

        .badge-3w {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
        }

        .badge-2w {
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            color: white;
        }

        /* Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-info p {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
        }

        .stat-info small {
            font-size: 0.8rem;
            color: #666;
        }

        /* Main Content */
        .main-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-in;
            backdrop-filter: blur(5px);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .form-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
            animation: slideIn 0.3s ease-out;
        }

        .form-container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Search and Filter */

            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            position: relative;
            min-width: 200px;
        }

        .search-input input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-icon {

            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-toggle {
            padding: 10px 20px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-panel {

            background: white;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 12px;
            color: #666;
        }

        .sort-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .sort-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
        }

        .service-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .service-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .service-table th,
        .service-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .service-table tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .edit-btn {
            background: #28a745;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 12px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .page-btn:hover:not(:disabled) {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .page-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .toast-success {
            background: #28a745;
        }

        .toast-error {
            background: #dc3545;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.5rem;
                flex-direction: column;
                gap: 5px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('vehicleServices', JSON.stringify(services));
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();

        // Update vehicle models based on type
        function updateVehicleModels(vehicleType) {
            const modelSelect = document.getElementById('vehicleModel');
            if (modelSelect) {
                const models = vehicleModels[vehicleType] || [];
                modelSelect.innerHTML = '<option value="">Select model</option>' +
                    models.map(model => `<option value="${model}">${model}</option>`).join('');
            }
        }

        // Filter and sort services
        function getFilteredAndSortedServices() {
            let filtered = [...services];

            // Apply filters
            if (currentFilters.vehicleNumber) {
                filtered = filtered.filter(s => 
                    s.vehicleNumber.toLowerCase().includes(currentFilters.vehicleNumber.toLowerCase()) ||
                    s.vehicleModel.toLowerCase().includes(currentFilters.vehicleNumber.toLowerCase())
                );
            }
            if (currentFilters.serviceType) {
                filtered = filtered.filter(s => s.serviceType === currentFilters.serviceType);
            }
            if (currentFilters.vehicleType) {
                filtered = filtered.filter(s => s.vehicleType === currentFilters.vehicleType);
            }
            if (currentFilters.vehicleModel) {
                filtered = filtered.filter(s => s.vehicleModel === currentFilters.vehicleModel);
            }

            // Apply sorting
            filtered.sort((a, b) => {
                let aVal = a[currentSort.field];
                let bVal = b[currentSort.field];
                
                if (currentSort.field === 'date') {
                    aVal = new Date(aVal);
                    bVal = new Date(bVal);
                }
                if (currentSort.field === 'cost') {
                    aVal = parseFloat(aVal);
                    bVal = parseFloat(bVal);
                }
                
                if (aVal < bVal) return currentSort.order === 'asc' ? -1 : 1;
                if (aVal > bVal) return currentSort.order === 'asc' ? 1 : -1;
                return 0;
            });

            return filtered;
        }

        // Get paginated services
        function getPaginatedServices() {
            const filtered = getFilteredAndSortedServices();
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            return {
                services: filtered.slice(start, end),
                total: filtered.length,
                totalPages: Math.ceil(filtered.length / itemsPerPage)
            };
        }

        // Get analytics data

            const threeWheelers = services.filter(s => s.vehicleType === '3-Wheeler').length;
            const twoWheelers = services.filter(s => s.vehicleType === '2-Wheeler').length;
            
            const revenue4W = services.filter(s => s.vehicleType === '4-Wheeler').reduce((sum, s) => sum + s.cost, 0);
            const revenue3W = services.filter(s => s.vehicleType === '3-Wheeler').reduce((sum, s) => sum + s.cost, 0);
            const revenue2W = services.filter(s => s.vehicleType === '2-Wheeler').reduce((sum, s) => sum + s.cost, 0);
            
            const servicesByType = {};
            const servicesByStatus = {};
            const servicesByModel = {};
            
            services.forEach(s => {
                servicesByType[s.serviceType] = (servicesByType[s.serviceType] || 0) + 1;
                servicesByStatus[s.status] = (servicesByStatus[s.status] || 0) + 1;
                servicesByModel[s.vehicleModel] = (servicesByModel[s.vehicleModel] || 0) + 1;
            });
            
            return { 
                totalServices, totalRevenue, fourWheelers, threeWheelers, twoWheelers,
                revenue4W, revenue3W, revenue2W,
                servicesByType, servicesByStatus, servicesByModel 
            };
        }

        // CRUD Operations
        function addService(serviceData) {
            const newService = {
                id: Date.now().toString(),
                ...serviceData,
                date: serviceData.date || new Date().toISOString().split('T')[0]
            };
            services.push(newService);
            saveData();
            showToast(`${serviceData.vehicleModel} service added successfully! 🎉`, 'success');
            return newService;
        }

        function updateService(id, serviceData) {
            const index = services.findIndex(s => s.id === id);
            if (index !== -1) {
                services[index] = { ...services[index], ...serviceData };
                saveData();
                showToast(`${serviceData.vehicleModel} updated successfully! ✏️`, 'success');
                return services[index];
            }
            return null;
        }

        function deleteService(id) {
            if (confirm('Are you sure you want to delete this service record?')) {
                services = services.filter(s => s.id !== id);
                saveData();
                showToast('Service deleted successfully! 🗑️', 'success');
                return true;
            }
            return false;
        }

        // Render Analytics
        function renderAnalytics() {
            const analytics = getAnalytics();
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🚗</div>
                        <div class="stat-info">
                            <h3>Total Services</h3>
                            <p>${analytics.totalServices}</p>
                            <small>🚗 4W: ${analytics.fourWheelers} | 🛺 3W: ${analytics.threeWheelers} | 🏍️ 2W: ${analytics.twoWheelers}</small>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <h3>Total Revenue</h3>
                            <p>₹${analytics.totalRevenue.toLocaleString()}</p>
                            <small>🚗 4W: ₹${analytics.revenue4W.toLocaleString()} | 🛺 3W: ₹${analytics.revenue3W.toLocaleString()} | 🏍️ 2W: ₹${analytics.revenue2W.toLocaleString()}</small>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-info">
                            <h3>Service Types</h3>
                            <p>${Object.keys(analytics.servicesByType).length}</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⚡</div>
                        <div class="stat-info">
                            <h3>Active Services</h3>
                            <p>${(analytics.servicesByStatus['Pending'] || 0) + (analytics.servicesByStatus['In Progress'] || 0)}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render Form
        function renderForm() {
            if (!showForm && !editingService) return '';
            
            const isEditing = !!editingService;
            const data = isEditing ? editingService : {};
            const vehicleType = data.vehicleType || '';
            const models = vehicleModels[vehicleType] || [];
            
            return `
                <div class="form-container">
                    <h2>${isEditing ? '✏️ Edit Service Record' : '📝 Add New Service Record'}</h2>
                    <form id="serviceForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Vehicle Type *</label>
                                <select id="vehicleType" onchange="updateVehicleModels(this.value)" required>
                                    <option value="">Select vehicle type</option>
                                    <option value="4-Wheeler" ${data.vehicleType === '4-Wheeler' ? 'selected' : ''}>🚗 4-Wheeler (Car/SUV)</option>
                                    <option value="3-Wheeler" ${data.vehicleType === '3-Wheeler' ? 'selected' : ''}>🛺 3-Wheeler (Auto/E-Rickshaw)</option>
                                    <option value="2-Wheeler" ${data.vehicleType === '2-Wheeler' ? 'selected' : ''}>🏍️ 2-Wheeler (Bike/Scooter)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Vehicle Model *</label>
                                <select id="vehicleModel" required>
                                    <option value="">Select model</option>
                                    ${models.map(model => 
                                        `<option value="${model}" ${data.vehicleModel === model ? 'selected' : ''}>${model}</option>`
                                    ).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Vehicle Number *</label>
                                <input type="text" id="vehicleNumber" value="${data.vehicleNumber || ''}" 
                                       placeholder="e.g., KA01AB1234" maxlength="12" required>
                            </div>
                            <div class="form-group">
                                <label>Owner Name *</label>
                                <input type="text" id="ownerName" value="${data.ownerName || ''}" 
                                       placeholder="Enter owner's full name" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Service Type *</label>
                                <select id="serviceType" required>
                                    <option value="">Select service type</option>
                                    ${serviceTypes.map(type => 
                                        `<option value="${type}" ${data.serviceType === type ? 'selected' : ''}>${type}</option>`
                                    ).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Date *</label>
                                <input type="date" id="date" value="${data.date || new Date().toISOString().split('T')[0]}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Cost (₹) *</label>
                                <input type="number" id="cost" value="${data.cost || ''}" 
                                       placeholder="Enter service cost" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select id="status">
                                    ${statuses.map(status => 
                                        `<option value="${status}" ${data.status === status ? 'selected' : ''}>${status}</option>`
                                    ).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="description" rows="3" placeholder="Additional details about the service..." maxlength="500">${data.description || ''}</textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="cancelForm()">Cancel</button>
                            <button type="submit" class="btn btn-primary">${isEditing ? 'Update Service' : 'Add Service'}</button>
                        </div>
                    </form>
                </div>
            `;
        }

        // Render Search and Filter
        function renderSearchFilter() {
            const topModels = Object.entries(getAnalytics().servicesByModel)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5)
                .map(([model]) => model);
            
            return `
                <div class="search-filter">
                    <div class="search-bar">
                        <div class="search-input">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="searchVehicle" placeholder="Search by vehicle number or model..." 
                                   value="${currentFilters.vehicleNumber}" onkeyup="handleSearch()">
                        </div>
                        <button class="filter-toggle" onclick="toggleFilters()">
                            🔧 Filter
                        </button>
                    </div>
                    <div id="filtersPanel" style="display: none;" class="filters-panel">
                        <div class="filter-group">
                            <label>Vehicle Type</label>
                            <select id="filterVehicleType" onchange="handleFilterChange()">
                                <option value="">All Types</option>
                                <option value="4-Wheeler" ${currentFilters.vehicleType === '4-Wheeler' ? 'selected' : ''}>🚗 4-Wheeler</option>
                                <option value="3-Wheeler" ${currentFilters.vehicleType === '3-Wheeler' ? 'selected' : ''}>🛺 3-Wheeler</option>
                                <option value="2-Wheeler" ${currentFilters.vehicleType === '2-Wheeler' ? 'selected' : ''}>🏍️ 2-Wheeler</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Vehicle Model</label>
                            <select id="filterVehicleModel" onchange="handleFilterChange()">
                                <option value="">All Models</option>
                                ${topModels.map(model => 
                                    `<option value="${model}" ${currentFilters.vehicleModel === model ? 'selected' : ''}>${model}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Service Type</label>
                            <select id="filterServiceType" onchange="handleFilterChange()">
                                <option value="">All Types</option>
                                ${serviceTypes.map(type => 
                                    `<option value="${type}" ${currentFilters.serviceType === type ? 'selected' : ''}>${type}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <button class="btn btn-secondary" onclick="clearFilters()">Clear All</button>
                    </div>
                    <div class="sort-buttons">
                        <button class="sort-btn ${currentSort.field === 'vehicleType' ? 'active' : ''}" onclick="handleSort('vehicleType')">
                            🚗 Type ${currentSort.field === 'vehicleType' ? (currentSort.order === 'desc' ? '↓' : '↑') : ''}
                        </button>
                        <button class="sort-btn ${currentSort.field === 'vehicleModel' ? 'active' : ''}" onclick="handleSort('vehicleModel')">
                            🏷️ Model ${currentSort.field === 'vehicleModel' ? (currentSort.order === 'desc' ? '↓' : '↑') : ''}
                        </button>
                        <button class="sort-btn ${currentSort.field === 'date' ? 'active' : ''}" onclick="handleSort('date')">
                            📅 Date ${currentSort.field === 'date' ? (currentSort.order === 'desc' ? '↓' : '↑') : ''}
                        </button>
                        <button class="sort-btn ${currentSort.field === 'cost' ? 'active' : ''}" onclick="handleSort('cost')">
                            💰 Cost ${currentSort.field === 'cost' ? (currentSort.order === 'desc' ? '↓' : '↑') : ''}
                        </button>
                    </div>
                </div>
            `;
        }

        // Render Service Table
        function renderServiceTable() {
            const { services: paginatedServices, total, totalPages } = getPaginatedServices();
            
            if (paginatedServices.length === 0) {
                return `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 20px;">🚗</div>
                        <h3>No service records found</h3>
                        <p>Click "Add New Service" to create your first service record.</p>
                    </div>
                `;
            }
            
            return `
                <div class="table-responsive">
                    <table class="service-table">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Model</th>
                                <th>Vehicle No</th>
                                <th>Owner</th>
                                <th>Service</th>
                                <th>Date</th>
                                <th>Cost</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${paginatedServices.map(service => `
                                <tr>
                                    <td>
                                        <span class="vehicle-badge ${service.vehicleType === '4-Wheeler' ? 'badge-4w' : service.vehicleType === '3-Wheeler' ? 'badge-3w' : 'badge-2w'}">
                                            ${service.vehicleType === '4-Wheeler' ? '🚗 4W' : service.vehicleType === '3-Wheeler' ? '🛺 3W' : '🏍️ 2W'}
                                        </span>
                                    </td>
                                    <td><strong>${service.vehicleModel}</strong></td>
                                    <td>${service.vehicleNumber}</td>
                                    <td>${service.ownerName}</td>
                                    <td>${service.serviceType}</td>
                                    <td>${new Date(service.date).toLocaleDateString()}</td>
                                    <td>₹${service.cost.toLocaleString()}</td>
                                    <td>
                                        <span class="status-badge" style="background: ${
                                            service.status === 'Completed' ? '#28a745' :
                                            service.status === 'In Progress' ? '#17a2b8' :
                                            service.status === 'Pending' ? '#ffc107' : '#dc3545'
                                        }">
                                            ${service.status}
                                        </span>
                                    </td>
                                    <td>
                                        <div class="action-buttons">
                                            <button class="action-btn edit-btn" onclick="editService('${service.id}')">✏️ Edit</button>
                                            <button class="action-btn delete-btn" onclick="deleteServiceHandler('${service.id}')">🗑️ Delete</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                ${renderPagination(totalPages)}
            `;
        }

        // Render Pagination
        function renderPagination(totalPages) {
            if (totalPages <= 1) return '';
            
            let pages = [];
            for (let i = 1; i <= totalPages; i++) {
                pages.push(`
                    <button class="page-btn ${currentPage === i ? 'active' : ''}" 
                            onclick="goToPage(${i})">${i}</button>
                `);
            }
            
            return `
                <div class="pagination">
                    <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>«</button>
                    ${pages.join('')}
                    <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>
                </div>
            `;
        }

        // Main Render Function
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                ${renderAnalytics()}
                <div class="main-content">
                    <div style="text-align: right; margin-bottom: 20px;">
                        <button class="btn btn-primary" onclick="toggleForm()">
                            ${showForm || editingService ? '✖ Cancel' : '+ Add New Service'}
                        </button>
                    </div>
                    ${renderForm()}
                    ${renderSearchFilter()}
                    ${renderServiceTable()}
                </div>
            `;
        }

        // Event Handlers
        window.toggleForm = function() {
            showForm = !showForm;
            if (showForm) editingService = null;
            render();
        };

        window.cancelForm = function() {
            showForm = false;
            editingService = null;
            render();
        };

        window.editService = function(id) {
            const service = services.find(s => s.id === id);
            if (service) {
                editingService = service;
                showForm = false;
                render();
            }
        };

        window.deleteServiceHandler = function(id) {
            if (deleteService(id)) {
                if (currentPage > 1 && getPaginatedServices().services.length === 0) {
                    currentPage--;
                }
                render();
            }
        };

        window.handleSearch = function() {
            const searchInput = document.getElementById('searchVehicle');
            currentFilters.vehicleNumber = searchInput.value;
            currentPage = 1;
            render();
        };

        window.handleFilterChange = function() {
            const vehicleTypeFilter = document.getElementById('filterVehicleType');
            const vehicleModelFilter = document.getElementById('filterVehicleModel');
            const serviceTypeFilter = document.getElementById('filterServiceType');
            
            currentFilters.vehicleType = vehicleTypeFilter ? vehicleTypeFilter.value : '';
            currentFilters.vehicleModel = vehicleModelFilter ? vehicleModelFilter.value : '';
            currentFilters.serviceType = serviceTypeFilter ? serviceTypeFilter.value : '';
            currentPage = 1;
            render();
        };

        window.clearFilters = function() {
            currentFilters = { vehicleNumber: '', serviceType: '', vehicleType: '', vehicleModel: '' };
            currentPage = 1;
            render();
        };

        window.toggleFilters = function() {
            const panel = document.getElementById('filtersPanel');
            if (panel.style.display === 'none') {
                panel.style.display = 'flex';
            } else {
                panel.style.display = 'none';
            }
        };

        window.handleSort = function(field) {
            if (currentSort.field === field) {
                currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.order = 'desc';
            }
            render();
        };

        window.goToPage = function(page) {
            const { totalPages } = getPaginatedServices();
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                render();
            }
        };

        // Form Submission
        document.addEventListener('submit', function(e) {
            if (e.target.id === 'serviceForm') {
                e.preventDefault();
                
                const formData = {
                    vehicleType: document.getElementById('vehicleType').value,
                    vehicleModel: document.getElementById('vehicleModel').value,
                    vehicleNumber: document.getElementById('vehicleNumber').value.toUpperCase(),
                    ownerName: document.getElementById('ownerName').value,
                    serviceType: document.getElementById('serviceType').value,
                    date: document.getElementById('date').value,
                    cost: parseFloat(document.getElementById('cost').value),
                    status: document.getElementById('status').value,
                    description: document.getElementById('description').value
                };
                
                // Validate
                if (!formData.vehicleType || !formData.vehicleModel || !formData.vehicleNumber || 
                    !formData.ownerName || !formData.serviceType || !formData.date || !formData.cost) {
                    showToast('Please fill all required fields!', 'error');
                    return;
                }
                
                if (formData.cost < 0) {
                    showToast('Cost cannot be negative!', 'error');
                    return;
                }
                
                if (editingService) {
                    updateService(editingService.id, formData);
                    editingService = null;
                } else {
                    addService(formData);
                }
                
                currentPage = 1;
                render();
            }
        });

        // Initialize
        loadData();
        render();
    </script>
</body>
</html>
